query Input {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            priceGroup: metafield(namespace: "custom", key: "price_group") {
              value
            }
          }
        }
      }
    }
  }
  discountNode {
    metafield(namespace: "$app:cross_group_discounts", key: "function-configuration") {
      value
    }
  }
}
