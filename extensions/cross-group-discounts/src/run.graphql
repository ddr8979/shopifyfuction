query Input {
  discountNode {
    metafield(namespace: "$app:cross_group_discounts", key: "function-configuration") {
      value
    }
  }
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            # Grupo de precio: valor total de la promo (ej: 2000 para "2x2000")
            # Asignar en: Admin → Productos → [producto] → Metafields → custom.price_group
            grupoPromo: metafield(namespace: "custom", key: "price_group") {
              value
            }
            # Cantidad mínima de ítems del grupo (opcional, default 2)
            # Asignar en: Admin → Productos → [producto] → Metafields → custom.price_group_qty
            cantidadGrupo: metafield(namespace: "custom", key: "price_group_qty") {
              value
            }
            tag1200: hasAnyTag(tags: ["2x1200", "2X1200", "1200"])
            tag1500: hasAnyTag(tags: ["2x1500", "2X1500", "2x1500-1", "1500"])
            tag2000: hasAnyTag(tags: ["2x2000", "2X2000", "2x2000-calzado", "2000"])
            tag2500: hasAnyTag(tags: ["2x2500", "2X2500", "2x2500-calzado", "2500"])
            tag3000: hasAnyTag(tags: ["2x3000", "2X3000", "3000"])
          }
        }
      }
    }
  }
}
